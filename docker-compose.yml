services:
  db:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD:-_renderd}
      AUTOVACUUM: ${AUTOVACUUM:-on}
    volumes:
      - osm-db-data:/var/lib/postgresql
      - ./docker/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./docker/db/10-optimize-db.sh:/docker-entrypoint-initdb.d/10-optimize-db.sh
      - ./postgresql.custom.conf.tmpl:/etc/postgresql/postgresql.custom.conf.tmpl
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d gis" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  import:
    build:
      context: .
      target: importer
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: ${PGPASSWORD:-_renderd}
      DOWNLOAD_PBF: ${DOWNLOAD_PBF:-}
      THREADS: ${THREADS:-4}
      FLAT_NODES: ${FLAT_NODES:-disabled}
      UPDATES: ${UPDATES:-disabled}
    volumes:
      - osm-style:/data/style
      - osm-import-data:/data/database
      # Optional: To use a local OSM PBF file from your host, uncomment the line below:
      # - ./region.osm.pbf:/data/region.osm.pbf
    depends_on:
      db:
        condition: service_healthy

  renderd:
    build:
      context: .
      target: renderer
    environment:
      PGHOST: db
      PGUSER: _renderd
      PGPASSWORD: ${PGPASSWORD:-_renderd}
      THREADS: ${THREADS:-4}
    volumes:
      - osm-style:/data/style
      - osm-tiles:/var/cache/renderd/tiles
      - renderd-socket:/run/renderd
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      target: webserver
    ports:
      - "${PORT:-8080}:80"
    environment:
      ALLOW_CORS: ${ALLOW_CORS:-enabled}
    volumes:
      - osm-tiles:/var/cache/renderd/tiles
      - renderd-socket:/run/renderd
    depends_on:
      - renderd

  updater:
    build:
      context: .
      target: updater
    environment:
      PGHOST: db
      PGUSER: _renderd
      PGPASSWORD: ${PGPASSWORD:-_renderd}
      UPDATES: ${UPDATES:-enabled}
      THREADS: ${THREADS:-4}
    volumes:
      - osm-style:/data/style
      - osm-tiles:/var/cache/renderd/tiles
      - osm-import-data:/data/database
    depends_on:
      db:
        condition: service_healthy
      renderd:
        condition: service_started

# Named volumes for sharing data between microservices
volumes:
  # Dedicated volume for PostgreSQL data cluster storage
  osm-db-data: # Volume for osm2pgsql flat nodes, replication sequence files, and polygons

  osm-import-data: # Shared stylesheet volume containing compiled XML styles

  osm-style: # Shared tile cache directory accessed by both Apache and renderd

  osm-tiles: # Shared Unix socket directory for mod_tile/renderd communication

  renderd-socket:
