version: 2
updates:
- package-ecosystem: docker
  directories:
  - /docker/db
  - /docker/import
  - /docker/renderd
  - /docker/updater
  - /docker/web
  commit-message:
    prefix: "docker"
  assignees:
  - "Harvester57"
  schedule:
    interval: weekly
  groups:
    docker-dependencies:
      applies-to: version-updates
      patterns:
      - "*"
- package-ecosystem: "github-actions"
  directory: "/"
  commit-message:
    prefix: "actions"
  assignees:
  - "Harvester57"
  schedule:
    interval: weekly
  groups:
    actions-dependencies:
      applies-to: version-updates
      patterns:
      - "*"
