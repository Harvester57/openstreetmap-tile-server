name: Build
on:
  push:
    branches:
    - master
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
    - '**.md'
    - 'LICENSE'
    - '.vscode/**'
  pull_request:
    branches:
    - master
    - dev
    paths-ignore:
    - '**.md'
    - 'LICENSE'
    - '.vscode/**'

# cancel outdated jobs for the same reference
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE : ${{ github.repository_owner }}/openstreetmap-tile-server
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:

  build:
    strategy:
      matrix:
        service: [import, renderd, web, updater, db]
        arch: [amd64]
        include:
        - arch: amd64
          runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      PLATFORM: linux/${{ matrix.arch }}
    steps:
    - 
      name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    -
      name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          persist-credentials: false

    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    -
      name: Build and Cache
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        push       : false
        platforms  : ${{ env.PLATFORM }}
        context    : ./docker/${{ matrix.service }}
        file       : ./docker/${{ matrix.service }}/Dockerfile
        tags       : openstreetmap-tile-server-${{ matrix.service }}:latest
        outputs    : type=docker,dest=/tmp/openstreetmap-tile-server-${{ matrix.service }}-${{ matrix.arch }}.tar
        cache-from : type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-${{ env.PLATFORM }}
        cache-to   : type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-${{ env.PLATFORM }},mode=max

    -
      name: Upload Image Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: openstreetmap-tile-server-${{ matrix.service }}-${{ matrix.arch }}
        path: /tmp/openstreetmap-tile-server-${{ matrix.service }}-${{ matrix.arch }}.tar
        if-no-files-found: error
        retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      PORT      : 80
    steps:
    - 
      name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    -
      name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          persist-credentials: false

    -
      name: Download Image Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: openstreetmap-tile-server-*-amd64
        path: /tmp
        merge-multiple: true

    -
      name: Load Images
      run: |
        for image in import renderd web updater db; do
          docker load --input /tmp/openstreetmap-tile-server-$image-amd64.tar
        done

    -
      name: Import Luxembourg
      run : docker compose run --rm import

    -
      name: Start server
      run : |
        docker compose up -d web updater
        docker compose logs
    -
      name: Download tiles
      run : |
        curl  http://localhost/tile/0/0/0.png            --fail  -o 000.png
        curl  http://localhost/tile/1/0/0.png            --fail  -o 100.png
        curl  http://localhost/tile/1/0/1.png            --fail  -o 101.png
        curl  http://localhost/tile/1/1/0.png            --fail  -o 110.png
        curl  http://localhost/tile/1/1/1.png            --fail  -o 111.png
        curl  http://localhost/tile/18/138474/85459.png  --fail  -o empty.png
        curl  http://localhost/tile/18/135536/89345.png  --fail  -o example.png
    -
      name: Verify tiles
      run : |
        sha1sum  *.png
        sha1sum  --check  <<EOF
        c226ca747874fb1307eef853feaf9d8db28cef2b *empty.png
        EOF
        tiles=(`ls *.png`)
        for ((i=0; i<${#tiles[@]}; i++)) ; do
          if [ `file  --brief  --mime-type  "${tiles[$i]}"` != 'image/png' ] ; then
            >&2  echo  "ERROR: ${tiles[$i]} is not a image/png file"
            exit 1
          fi
          for ((j=i+1; j<${#tiles[@]}; j++)) ; do
            if ( diff  "${tiles[$i]}"  "${tiles[$j]}" ) ; then
              >&2  echo  "ERROR: ${tiles[$i]} is identical to ${tiles[$j]}"
              exit 2
            fi
          done
        done
    -
      name: Cleanup
      if: always()
      run : |
        docker compose down -v
        docker rmi --force openstreetmap-tile-server-import:latest openstreetmap-tile-server-renderd:latest openstreetmap-tile-server-web:latest openstreetmap-tile-server-updater:latest

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
      attestations: write
    needs:
    - test
    if: ${{ github.event_name != 'pull_request' }}
    strategy:
      matrix:
        service: [import, renderd, web, updater, db]
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    -
      name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          persist-credentials: false

    # Install the cosign tool except on PR
    # https://github.com/sigstore/cosign-installer
    - 
      name: Install cosign
      if: github.event_name != 'pull_request'
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 #v4.1.2
  
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      with:
        platforms: linux/amd64,linux/arm64/v8

    -
      name: Login to GHCR
      if: github.event_name != 'pull_request'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Extract metadata (tags, labels) for Docker
    # https://github.com/docker/metadata-action
    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
        flavor: |
          latest=true

    -
      name: Build and push
      id: build-and-push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        sbom       : true
        pull       : true
        push       : true
        provenance : mode=max
        platforms  : linux/amd64
        context    : ./docker/${{ matrix.service }}
        file       : ./docker/${{ matrix.service }}/Dockerfile
        tags       : ${{ steps.meta.outputs.tags }}
        labels     : ${{ steps.meta.outputs.labels }}
        cache-from: |
          type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-linux/amd64
          type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-linux/arm64/v8
        cache-to: type=gha,mode=max

    # Sign the resulting Docker image digest except on PRs.
    # This will only write to the public Rekor transparency log when the Docker
    # repository is public to avoid leaking data.  If you would like to publish
    # transparency data even for private images, pass --force to cosign below.
    # https://github.com/sigstore/cosign
    - name: Sign the published Docker image
      if: ${{ github.event_name != 'pull_request' }}
      env:
        # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        TAGS: ${{ steps.meta.outputs.tags }}
        DIGEST: ${{ steps.build-and-push.outputs.digest }}
      # This step uses the identity token to provision an ephemeral certificate
      # against the sigstore community Fulcio instance.
      run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

    - name: Attest
      if: github.event_name != 'pull_request'
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      id: attest
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
        subject-digest: ${{ steps.build-and-push.outputs.digest }}
        push-to-registry: true

  scan:
    needs: deploy
    permissions:
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      contents: write # for sbom-action artifact uploads
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [import, renderd, web, updater, db]
    steps:
      - 
        name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      -
        name: Download Image Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openstreetmap-tile-server-${{ matrix.service }}-amd64
          path: /tmp

      -
        name: Load Image
        run: |
          docker load --input /tmp/openstreetmap-tile-server-${{ matrix.service }}-amd64.tar
          docker tag openstreetmap-tile-server-${{ matrix.service }}:latest localbuild/testimage-${{ matrix.service }}:latest
      -
        name: Generate SBOM and upload dependency results
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: localbuild/testimage-${{ matrix.service }}:latest
          artifact-name: "${{ github.event.repository.name }}-${{ matrix.service }}.cyclonedx-sbom.json"
          output-file: "/tmp/${{ github.event.repository.name }}-${{ matrix.service }}.cyclonedx-sbom.json"
          dependency-snapshot: true
          format: cyclonedx-json
          upload-artifact: true
      -
        name: Scan SBOM
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          cache-db: false
          fail-build: false
          sbom: "/tmp/${{ github.event.repository.name }}-${{ matrix.service }}.cyclonedx-sbom.json"
          output-format: sarif
          only-fixed: true
      -
        name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.29.5
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
