name: Build
on:
  push:
    branches:
    - master
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
    - master

# cancel outdated jobs for the same reference
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE : ${{ github.repository_owner }}/openstreetmap-tile-server
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:

  build:
    strategy:
      matrix:
        service: [import, renderd, web, updater]
        arch: [amd64, arm64]
        include:
        - arch: amd64
          runner: ubuntu-24.04
        - arch: arm64
          runner: ubuntu-24.04-arm
          variant: v8
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      PLATFORM: linux/${{ matrix.arch }}${{ (matrix.variant != '' && format('/{0}', matrix.variant)) || '' }}
    steps:
    - 
      name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    -
      name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          persist-credentials: false

    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    -
      name: Build and Cache
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        pull       : true
        load       : true
        platforms  : ${{ env.PLATFORM }}
        context    : ./docker/${{ matrix.service }}
        file       : ./docker/${{ matrix.service }}/Dockerfile
        tags       : openstreetmap-tile-server-${{ matrix.service }}:latest
        cache-from : type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-${{ env.PLATFORM }}
        cache-to   : type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-${{ env.PLATFORM }},mode=max

  test:
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
    env:
      PORT      : 80
    steps:
    - 
      name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    -
      name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          persist-credentials: false

    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    -
      name: Load Importer from Cache
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context    : ./docker/import
        file       : ./docker/import/Dockerfile
        load       : true
        tags       : openstreetmap-tile-server-import:latest
        cache-from : type=gha,scope=${{ github.workflow }}:import-linux/amd64

    -
      name: Load Renderer from Cache
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context    : ./docker/renderd
        file       : ./docker/renderd/Dockerfile
        load       : true
        tags       : openstreetmap-tile-server-renderd:latest
        cache-from : type=gha,scope=${{ github.workflow }}:renderd-linux/amd64

    -
      name: Load Webserver from Cache
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context    : ./docker/web
        file       : ./docker/web/Dockerfile
        load       : true
        tags       : openstreetmap-tile-server-web:latest
        cache-from : type=gha,scope=${{ github.workflow }}:web-linux/amd64

    -
      name: Load Updater from Cache
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context    : ./docker/updater
        file       : ./docker/updater/Dockerfile
        load       : true
        tags       : openstreetmap-tile-server-updater:latest
        cache-from : type=gha,scope=${{ github.workflow }}:updater-linux/amd64

    -
      name: Import Luxembourg
      run : docker compose run --rm import

    -
      name: Start server
      run : |
        docker compose up -d web updater
        docker compose logs
    -
      name: Download tiles
      run : |
        curl  http://localhost/tile/0/0/0.png            --fail  -o 000.png
        curl  http://localhost/tile/1/0/0.png            --fail  -o 100.png
        curl  http://localhost/tile/1/0/1.png            --fail  -o 101.png
        curl  http://localhost/tile/1/1/0.png            --fail  -o 110.png
        curl  http://localhost/tile/1/1/1.png            --fail  -o 111.png
        curl  http://localhost/tile/18/138474/85459.png  --fail  -o empty.png
        curl  http://localhost/tile/18/135536/89345.png  --fail  -o example.png
    -
      name: Verify tiles
      run : |
        sha1sum  *.png
        sha1sum  --check  <<EOF
        c226ca747874fb1307eef853feaf9d8db28cef2b *empty.png
        EOF
        tiles=(`ls *.png`)
        for ((i=0; i<${#tiles[@]}; i++)) ; do
          if [ `file  --brief  --mime-type  "${tiles[$i]}"` != 'image/png' ] ; then
            >&2  echo  "ERROR: ${tiles[$i]} is not a image/png file"
            exit 1
          fi
          for ((j=i+1; j<${#tiles[@]}; j++)) ; do
            if ( diff  "${tiles[$i]}"  "${tiles[$j]}" ) ; then
              >&2  echo  "ERROR: ${tiles[$i]} is identical to ${tiles[$j]}"
              exit 2
            fi
          done
        done
    -
      name: Cleanup
      if: always()
      run : |
        docker compose down -v
        docker rmi --force openstreetmap-tile-server-import:latest openstreetmap-tile-server-renderd:latest openstreetmap-tile-server-web:latest openstreetmap-tile-server-updater:latest

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
      attestations: write
    needs:
    - test
    if: ${{ github.event_name != 'pull_request' }}
    strategy:
      matrix:
        service: [import, renderd, web, updater]
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    -
      name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          persist-credentials: false

    # Install the cosign tool except on PR
    # https://github.com/sigstore/cosign-installer
    - 
      name: Install cosign
      if: github.event_name != 'pull_request'
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 #v4.1.2
  
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      with:
        platforms: linux/amd64,linux/arm64/v8

    -
      name: Login to GHCR
      if: github.event_name != 'pull_request'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Extract metadata (tags, labels) for Docker
    # https://github.com/docker/metadata-action
    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
        flavor: |
          latest=true

    -
      name: Build and push
      id: build-and-push
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        sbom       : true
        pull       : true
        push       : true
        provenance: mode=max
        platforms  : linux/amd64,linux/arm64/v8
        context    : ./docker/${{ matrix.service }}
        file       : ./docker/${{ matrix.service }}/Dockerfile
        tags       : ${{ steps.meta.outputs.tags }}
        labels     : ${{ steps.meta.outputs.labels }}
        cache-from: |
          type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-linux/amd64
          type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-linux/arm64/v8
        cache-to: type=gha,mode=max

    # Sign the resulting Docker image digest except on PRs.
    # This will only write to the public Rekor transparency log when the Docker
    # repository is public to avoid leaking data.  If you would like to publish
    # transparency data even for private images, pass --force to cosign below.
    # https://github.com/sigstore/cosign
    - name: Sign the published Docker image
      if: ${{ github.event_name != 'pull_request' }}
      env:
        # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        TAGS: ${{ steps.meta.outputs.tags }}
        DIGEST: ${{ steps.build-and-push.outputs.digest }}
      # This step uses the identity token to provision an ephemeral certificate
      # against the sigstore community Fulcio instance.
      run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

    - name: Attest
      if: github.event_name != 'pull_request'
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      id: attest
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
        subject-digest: ${{ steps.build-and-push.outputs.digest }}
        push-to-registry: true

  scan:
    needs: deploy
    permissions:
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      contents: write # for sbom-action artifact uploads
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [import, renderd, web, updater]
    steps:
      - 
        name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        id: docker_build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          push: false
          load: true
          context: ./docker/${{ matrix.service }}
          file: ./docker/${{ matrix.service }}/Dockerfile
          tags: localbuild/testimage-${{ matrix.service }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ github.workflow }}:${{ matrix.service }}-linux/amd64
      -
        name: Generate SBOM and upload dependency results
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: localbuild/testimage-${{ matrix.service }}:latest
          artifact-name: "${{ github.event.repository.name }}-${{ matrix.service }}.cyclonedx-sbom.json"
          output-file: "/tmp/${{ github.event.repository.name }}-${{ matrix.service }}.cyclonedx-sbom.json"
          dependency-snapshot: true
          format: cyclonedx-json
          upload-artifact: true
      -
        name: Scan SBOM
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          cache-db: true
          fail-build: false
          sbom: "/tmp/${{ github.event.repository.name }}-${{ matrix.service }}.cyclonedx-sbom.json"
          output-format: sarif
      -
        name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v3.29.5
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}